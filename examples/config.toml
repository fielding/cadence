# cadence config — copy to ~/.config/cadence/config.toml and edit.
# All values shown are the built-in defaults.

[schedule]
sit_minutes = 45
stand_minutes = 15
warning_seconds = 15
enabled = true

[heights]
sit_inches = 26.8
stand_inches = 44.9

[warning]
enabled = true
# "notify" (desktop notification + sound, safest), "tap" (physical nudge),
# or "both". Start with "notify" until taps are proven safe on your desk.
mode = "notify"
# one up-and-back nudge per warning; raise if you want a more insistent knock
tap_count = 1
# 0.2in is below the Jiecang goto deadband (~5mm ignored); 0.3in works.
tap_delta_inches = 0.3
tap_pause_ms = 1200
sound = true

[safety]
min_height_inches = 22.0
max_height_inches = 50.0
require_manual_enable_on_start = true
do_not_move_if_user_recently_moved_desk = true
recent_manual_move_grace_seconds = 300
# Refuse absolute moves when the current height can't be read.
refuse_move_without_height = true

[working_hours]
enabled = false
days = ["mon", "tue", "wed", "thu", "fri"]
start = "09:00"
end = "18:00"

# A nightly window where the desk never moves — for when it shares a room with
# someone asleep. Off by default. The window may wrap midnight (start > end).
# Unlike working_hours, this holds even with the schedule running 24/7; when it
# lifts the captain re-reads posture and restarts the phase instead of firing
# an overnight-overdue move immediately.
[quiet_hours]
enabled = false
start = "22:00"
end = "07:00"

[behavior]
snooze_minutes = 15
reset_timer_on_manual_move = true

# Skip transitions when nobody is at the computer, judged by time since the
# last physical keyboard/mouse input (HID idle). Keep-awake apps like Caffeine
# hold the display on but don't fake input, so this stays accurate with them.
[presence]
enabled = true
idle_threshold_minutes = 10
# restart the current phase when you return, instead of firing an overdue move
reset_timer_on_return = true
# a due transition only fires if you've touched the keyboard/mouse this
# recently; otherwise it holds and fires shortly after you're back, so short
# breaks (bathroom, coffee) don't get a desk moving for an empty room
active_threshold_minutes = 2

# Maps raw device units to inches: inches = raw / raw_units_per_inch + offset_inches.
# Apex Pro firmware reports 0.1 inch units (confirmed live). Run
# `cadence calibrate <inches>` with the desk at a tape-measured height if the
# display itself has drifted.
[calibration]
raw_units_per_inch = 10.0
offset_inches = 0.0

# Filled in automatically by `cadence scan`.
[device]
# address = "XX:XX:XX:XX:XX:XX"
# name = "Apex Pro"
# service_uuid = "0000fe60-0000-1000-8000-00805f9b34fb"
# command_char_uuid = "0000fe61-0000-1000-8000-00805f9b34fb"
# notify_char_uuid = "0000fe62-0000-1000-8000-00805f9b34fb"
